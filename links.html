<script>
function updateClock() {
    const options = {
        timeZone: "America/New_York",
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit"
    };

    const now = new Date().toLocaleTimeString("en-US", options);
    document.getElementById("clock").textContent = "CLT: " + now;
}

setInterval(updateClock, 1000);
updateClock();
